apiVersion: apps/v1
kind: Deployment
metadata:
  name: kub-demo-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kub-demo
  template:
    metadata:
      labels:
        app: kub-demo
    spec:
      containers:
        - name: kub-demo
          image: arunodhai/kub-demo:1.0
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: kub-demo-service
spec:
  type: NodePort
  selector:
    app: kub-demo
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080